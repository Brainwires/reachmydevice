syntax = "proto3";

// ReachMyDevice control/data-channel wire schema.
//
// Versioning contract (see crate root): every message travels inside an `Envelope`
// that carries the SENDER's protocol version. A receiver whose MAJOR differs must
// reject the peer (a v1 viewer cleanly refuses an incompatible host, and vice
// versa). Fields are only ever *added* with new tag numbers within a MAJOR line;
// tags are never reused or repurposed, so MINOR bumps stay backward-compatible.
package rmd.v1;

// Top-level frame. One encoded Envelope == one data-channel message.
message Envelope {
  // Protocol version of the sender.
  uint32 protocol_major = 1;
  uint32 protocol_minor = 2;

  oneof payload {
    Hello hello = 10;
    HelloAck hello_ack = 11;
    InputEvent input = 12;
    Ping ping = 13;
    Pong pong = 14;
    Bye bye = 15;
    // v1 features (added in MINOR 1; older peers ignore unknown fields).
    ClipboardUpdate clipboard = 16;
    FileOffer file_offer = 17;
    FileChunk file_chunk = 18;
    FileAck file_ack = 19;
    FileComplete file_complete = 20;
    FileCancel file_cancel = 21;
    DisplayList display_list = 22;
    SelectDisplay select_display = 23;
    RequestKeyframe request_keyframe = 24;
    ViewOnly view_only = 25;
    // Audio (added in MINOR 2; host -> viewer Opus).
    AudioFrame audio = 26;
    // Digital zoom: the viewer tells the host which sub-rect of the screen to
    // crop + scale to full frame (added in MINOR 7; older hosts ignore it and
    // stay full-screen).
    SetZoom set_zoom = 27;
  }
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_HOST = 1;
  ROLE_VIEWER = 2;
}

// Video codecs a peer can handle. H.264 is symmetric (encode+decode, and browser-
// decodable); AV1 is host-encode / browser-decode only (no pure-Rust AV1 decoder),
// so a native viewer never lists it. Added in MINOR 3.
enum VideoCodec {
  VIDEO_CODEC_UNSPECIFIED = 0;
  VIDEO_CODEC_H264 = 1;
  VIDEO_CODEC_AV1 = 2;
}

// First message each side sends after the data channel opens.
message Hello {
  string device_name = 1;
  Role role = 2;
  // Reserved feature bitmask for Phase-4 negotiation (clipboard/files/audio).
  uint64 features = 3;
  // Unattended-access proof (optional). `public_key` is the 32-byte ed25519 key;
  // `signature` is over `"rmd-access-proof-v1" || public_key`. A host with
  // authorization enabled verifies this and checks the derived device_id against
  // its authorized list. Empty when the viewer has no identity (LAN/dev flows).
  bytes public_key = 4;
  bytes signature = 5;
  // Video codecs this peer can DECODE, best-preferred first (added MINOR 3).
  // A native viewer sends [H264]; a browser viewer sends e.g. [AV1, H264]. Empty
  // is treated as [H264] for backward compatibility with MINOR<3 peers.
  repeated VideoCodec supported_video_codecs = 6;
  // Connection password (added MINOR 6), RealVNC-style. Sent by a viewer when a
  // host has one set; travels inside the E2E-encrypted, DTLS-fingerprint-bound
  // data channel. Empty on the first Hello; the host replies with a HelloAck
  // whose `password_required=true`, then the viewer prompts and re-sends a Hello
  // carrying the password.
  string password = 7;
}

// Response to Hello. `accepted=false` carries a human-readable `reason`
// (e.g. "incompatible protocol major: host=2 viewer=1").
message HelloAck {
  bool accepted = 1;
  string reason = 2;
  string device_name = 3;
  uint64 features = 4;
  // Host's proof of identity, bound to this DTLS session (closes first-connect
  // MITM). `host_public_key` is the 32-byte ed25519 key; `host_proof` is a
  // signature over `"rmd-access-proof-v2" || host_public_key || 0x00 ||
  // dtls_fingerprint`. The viewer verifies it against the host's fingerprint from
  // the offer, then authenticates/TOFU-pins this key. Empty when the host has no
  // identity (LAN/dev).
  bytes host_public_key = 5;
  bytes host_proof = 6;
  // The codec the host is actually sending on the RTP track (added MINOR 3), so
  // the viewer configures the right decoder / detects an undecodable mismatch.
  // UNSPECIFIED is treated as H264 for MINOR<3 hosts.
  VideoCodec video_codec = 7;
  // Set (added MINOR 6) when the host rejected this Hello because it needs a
  // connection password (or the supplied one was wrong). The viewer distinguishes
  // this from other rejections, prompts the user, and re-sends a Hello with the
  // password. `reason` still carries a human-readable message.
  bool password_required = 8;
}

// --- Input (viewer -> host) ------------------------------------------------

message InputEvent {
  oneof event {
    MouseMove mouse_move = 1;
    MouseButton mouse_button = 2;
    MouseScroll mouse_scroll = 3;
    KeyEvent key = 4;
  }
}

// Pointer position normalized to [0,1] over the captured display, so the host
// maps it onto its own resolution regardless of the viewer's window size.
message MouseMove {
  double x = 1;
  double y = 2;
}

enum MouseBtn {
  MOUSE_BTN_UNSPECIFIED = 0;
  MOUSE_BTN_LEFT = 1;
  MOUSE_BTN_RIGHT = 2;
  MOUSE_BTN_MIDDLE = 3;
}

message MouseButton {
  MouseBtn button = 1;
  bool pressed = 2;
  // Position at the time of the click, normalized [0,1] (keeps click and move atomic).
  double x = 3;
  double y = 4;
}

message MouseScroll {
  double dx = 1;
  double dy = 2;
}

// Keys travel as USB HID usage codes (platform-neutral) so layouts stay sane
// across OSes; each platform's input backend maps to/from native keycodes.
message KeyEvent {
  uint32 hid_usage = 1;
  bool pressed = 2;
  uint32 modifiers = 3; // bitmask, see Modifiers in Rust
}

// --- Digital zoom (viewer -> host) -----------------------------------------

// The crop rectangle the host should magnify: a sub-region of the captured
// screen, normalized [0,1], that gets scaled back up to the full encoded frame.
// The viewer derives this from its pinch gesture and sends it whenever it
// changes. The host applies the SAME rect to (a) crop+scale the video before
// encoding and (b) remap incoming pointer coordinates, so taps land correctly.
// The identity rect {0,0,1,1} means "no zoom" (full screen).
message SetZoom {
  double x = 1; // left edge, normalized [0,1]
  double y = 2; // top edge, normalized [0,1]
  double w = 3; // width,  normalized (0,1]
  double h = 4; // height, normalized (0,1]
}

// --- Liveness / latency ----------------------------------------------------

message Ping {
  uint64 t_micros = 1; // sender monotonic clock, microseconds
}

message Pong {
  uint64 t_micros = 1; // echoes the Ping's t_micros for RTT measurement
}

message Bye {
  string reason = 1;
}

// --- Clipboard sync (bidirectional) ---------------------------------------

enum ClipboardKind {
  CLIPBOARD_KIND_UNSPECIFIED = 0;
  CLIPBOARD_KIND_TEXT = 1;
  CLIPBOARD_KIND_IMAGE_PNG = 2;
}

// A clipboard change to apply on the peer. `seq` is a monotonic counter and
// `origin_hash` a hash of the content; receivers drop an update whose content
// they just set, breaking sync loops.
message ClipboardUpdate {
  ClipboardKind kind = 1;
  bytes data = 2;
  uint64 seq = 3;
  fixed64 origin_hash = 4;
}

// --- File transfer (both directions, resumable) ---------------------------

// Announce a file. The receiver replies with a FileAck at the offset to start
// from (0 for new, >0 to resume a partial transfer).
message FileOffer {
  string transfer_id = 1; // unique per transfer
  string name = 2;
  uint64 size = 3;
  string mime = 4;
}

message FileChunk {
  string transfer_id = 1;
  uint64 offset = 2;
  bytes data = 3;
}

// Flow control + resume: "I have up to `offset` bytes; send from there."
message FileAck {
  string transfer_id = 1;
  uint64 offset = 2;
}

message FileComplete {
  string transfer_id = 1;
  reserved 2;                 // was `fixed64 sha256_prefix` — a weak 64-bit check
  reserved "sha256_prefix";
  bytes sha256 = 3;           // full 32-byte SHA-256 of the file, for integrity
}

message FileCancel {
  string transfer_id = 1;
  string reason = 2;
}

// --- Multi-monitor + session control --------------------------------------

message DisplayDescriptor {
  uint32 id = 1;
  uint32 width = 2;
  uint32 height = 3;
  string name = 4;
  bool primary = 5;
}

// Host -> viewer: the host's available displays (viewer enumerates + switches).
message DisplayList {
  repeated DisplayDescriptor displays = 1;
}

// Viewer -> host: capture this display id (per-monitor streams switched on demand).
message SelectDisplay {
  uint32 id = 1;
}

// Viewer -> host: request an IDR (e.g. on join or after loss).
message RequestKeyframe {}

// Viewer -> host: toggle view-only (host ignores input while true).
message ViewOnly {
  bool enabled = 1;
}

// Host -> viewer: one Opus audio packet (48 kHz mono, 20 ms). `seq` lets the
// viewer detect gaps for packet-loss concealment.
message AudioFrame {
  bytes opus = 1;
  uint64 seq = 2;
}
