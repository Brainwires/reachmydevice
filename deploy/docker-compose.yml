# ReachMyDevice rendezvous — single-unit deployment for a 1 vCPU / 1 GB VPS.
#
#   caddy      — TLS termination + reverse proxy (automatic Let's Encrypt/ACME)
#   rendezvous — signaling + device registry (axum + SQLite)
#   coturn     — STUN + TURN relay for NAT traversal
#
# Copy .env.example to .env and set RMD_DOMAIN, TURN_SECRET, etc.
# Then: docker compose up -d
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      RMD_DOMAIN: ${RMD_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - rendezvous

  rendezvous:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      RMD_RZ_ADDR: 0.0.0.0:8080
      DATABASE_URL: sqlite:/data/rmd.db?mode=rwc
      # Closed by default; set to 1/true only to provision the first account.
      RMD_RZ_OPEN_REGISTRATION: ${RMD_RZ_OPEN_REGISTRATION:-false}
      # Shared secret used to mint short-lived TURN credentials (must match coturn).
      RMD_TURN_SECRET: ${TURN_SECRET}
      # The address clients dial for STUN/TURN. This must be the coturn host's
      # DIRECT public IP (or a grey-cloud/non-proxied hostname) — NOT a
      # Cloudflare-proxied ${RMD_DOMAIN}, since a proxied domain never reaches the
      # UDP relay. Leave unset to serve STUN-only (no relay).
      RMD_TURN_HOST: ${RMD_TURN_HOST:-}
      RMD_TURN_PORT: ${RMD_TURN_PORT:-3478}
    volumes:
      - rendezvous_data:/data
    # Not published directly; only reachable via caddy.
    expose:
      - "8080"

  coturn:
    image: coturn/coturn:4
    restart: unless-stopped
    network_mode: host # TURN needs the host network for the relay port range
    command:
      - -n
      - --log-file=stdout
      - --min-port=49160
      - --max-port=49200
      - --realm=${RMD_DOMAIN}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET}
      # Advertise the server's public IP as the relay address (required when the
      # host is behind NAT / has multiple interfaces, e.g. a VPS).
      - --external-ip=${RMD_TURN_EXTERNAL_IP}
      # STUN also works out of the box on 3478. (Omit --no-tlsv1_1/--no-cli: some
      # coturn images reject those flags; we don't expose TLS here anyway.)
    # Ports (host network): 3478/udp+tcp (STUN/TURN), 49160-49200/udp (relay).
    # IMPORTANT: open these inbound at your provider's firewall too (e.g. IONOS
    # Cloud Panel > Firewall Policies), not just the OS firewall — UDP 3478 and
    # UDP 49160-49200. A host-only ufw allow is not enough behind a cloud firewall.

volumes:
  caddy_data:
  caddy_config:
  rendezvous_data:
