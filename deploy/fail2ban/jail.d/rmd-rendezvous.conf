# Fail2ban jail — ReachMyDevice rendezvous. See deploy/fail2ban/README.md.
#
# Set `logpath` to wherever the rendezvous log lands. For the Docker json-file
# driver, get the exact path with:
#   docker inspect --format '{{.LogPath}}' rmd-rzv

[rmd-rendezvous]
enabled  = true
filter   = rmd-rendezvous
# Docker json-file log for the rmd-rzv container (edit to your actual path):
logpath  = /var/lib/docker/containers/*/*-json.log
# Ban an IP after this many auth failures within `findtime`.
maxretry = 6
findtime = 10m
bantime  = 1h
# `port` is informational for the default iptables action; the rendezvous is
# fronted by a proxy, so bans apply to the proxy's ingress. Adjust the action if
# you terminate TLS on the host or want to ban at a different layer.
port     = http,https
