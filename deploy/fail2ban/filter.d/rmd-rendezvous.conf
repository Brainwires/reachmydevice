# Fail2ban filter — ReachMyDevice rendezvous authentication failures.
#
# Bans source IPs that repeatedly fail authentication against the rendezvous:
#   - a bad device bearer token on the signaling socket (`/ws`) or `/api/ice`
#   - bad HTTP Basic credentials on the account/device API
#
# This complements the built-in per-IP rate limiter and per-account login
# throttle. It hardens the AUTH-ABUSE surface only — it is NOT a mitigation for
# volumetric (bandwidth) DDoS, which must be handled upstream of the host.
#
# The rendezvous emits one line per failure from the `rmd_security` target:
#   2026-07-07T22:58:31.544736Z  WARN rmd_security: auth-fail ip=203.0.113.7 path=/ws method=GET
# (When read from Docker's json-file log, the same text is embedded per record.)

[Definition]

failregex = auth-fail ip=<HOST> path=

ignoreregex =

# The rendezvous logs ISO-8601 timestamps; fail2ban auto-detects them. If your
# log wrapper hides them, uncomment and adjust:
# datepattern = %%Y-%%m-%%dT%%H:%%M:%%S
