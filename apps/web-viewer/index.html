<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReachMyDevice — web viewer</title>
<link data-trunk rel="rust" data-wasm-opt="s" />
<style>
  :root{--bg:#0b0d11;--panel:#171a21;--panel2:#1e222b;--border:#2a2f3a;--text:#e6e8ec;
    --muted:#9aa3b2;--accent:#4f8cff;--accent2:#3a6fd8;--err:#ff5c5c;--ok:#39d98a;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font:14px system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  body{overflow:hidden;}
  a{color:var(--accent);text-decoration:none;} a:hover{text-decoration:underline;}
  .logo{height:28px;border-radius:8px;padding:0 9px;display:inline-grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),#8a5cff);color:#fff;font-weight:700;
    font-size:12px;letter-spacing:1.5px;line-height:1;}
  .brand{display:flex;align-items:center;gap:10px;}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  #bar{position:fixed;top:0;left:0;right:0;display:flex;gap:10px;align-items:center;
    padding:8px 12px;background:rgba(15,17,21,.72);backdrop-filter:blur(6px);font-size:13px;z-index:10;
    transition:opacity .25s;} #bar.idle:not(:hover){opacity:.2;}
  #barStatus{color:var(--muted);} #bar .sp{flex:1;}

  #connect{position:fixed;inset:0;overflow:auto;padding:20px;display:grid;place-items:start center;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;
    width:100%;max-width:560px;margin:max(4vh,16px) 0;}
  .card h1{font-size:20px;margin:14px 0 4px;} .card .sub{color:var(--muted);margin:0 0 16px;font-size:13.5px;}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;}
  input{width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--border);
    background:var(--panel2);color:var(--text);font-size:14px;}
  button{padding:9px 14px;border-radius:9px;border:0;background:var(--accent);color:#fff;
    font-weight:600;cursor:pointer;font-size:13.5px;} button:hover{background:var(--accent2);}
  button.ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
  button.danger{background:transparent;color:var(--err);border:1px solid var(--border);}
  button.sm{padding:6px 10px;font-size:12.5px;} button:disabled{opacity:.5;cursor:default;}
  .iconbtn{width:34px;height:34px;padding:0;display:inline-grid;place-items:center;border-radius:9px;}
  .iconbtn svg{display:block;}
  .err{color:var(--err);font-size:13px;min-height:18px;margin-top:10px;}
  .row{display:flex;gap:10px;align-items:center;margin-top:16px;flex-wrap:wrap;}
  .head{display:flex;align-items:center;gap:10px;} .head .sp{flex:1;}
  .devs{display:flex;flex-direction:column;gap:8px;margin:8px 0;}
  .dev{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--border);
    border-radius:10px;padding:11px 13px;}
  .dev .meta{flex:1;min-width:0;} .dev .name{font-weight:600;}
  .dev .sub2{color:var(--muted);font-size:12px;margin-top:2px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;}
  .dev .acts{display:flex;gap:6px;flex:0 0 auto;}
  .pill{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:1px 8px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex:0 0 auto;} .dot.on{background:var(--ok);}
  .muted{color:var(--muted);} .foot{color:var(--muted);font-size:12px;margin-top:18px;text-align:center;}
  pre{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:12px;
    overflow:auto;font-size:12.5px;} .hint{color:var(--muted);font-size:12.5px;margin-top:8px;}
  .panel{border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:14px;background:#12151c;}
  .panel h2{margin:0 0 4px;font-size:15px;}

  #stage{position:fixed;inset:0;display:grid;place-items:center;background:#000;}
  #screen{max-width:100vw;max-height:100vh;width:auto;height:auto;background:#000;outline:none;
    transition:transform .2s;}
  /* Rotated views are centered explicitly (fixed + translate) and rotated about
     their center — grid centering doesn't reliably center a rotated child. The
     box is still sized to the video's aspect (constrained against the swapped
     viewport axis for 90°/270°) so pointer mapping stays exact. */
  #screen.rot1,#screen.rot2,#screen.rot3{position:fixed;top:50%;left:50%;}
  #screen.rot1,#screen.rot3{max-width:100vh;max-height:100vw;}
  #screen.rot1{transform:translate(-50%,-50%) rotate(90deg);}
  #screen.rot2{transform:translate(-50%,-50%) rotate(180deg);}
  #screen.rot3{transform:translate(-50%,-50%) rotate(-90deg);}
  #overlay{position:fixed;inset:0;display:grid;place-items:center;pointer-events:none;transition:opacity .3s;}
  #overlay .box{background:rgba(15,17,21,.85);border:1px solid var(--border);border-radius:14px;
    padding:24px 30px;text-align:center;max-width:80vw;}
  #overlay .spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #overlay .msg{font-size:15px;} #overlay .hint2{color:var(--muted);font-size:12.5px;margin-top:8px;}
  .hidden{display:none!important;}
</style>
</head>
<body>
  <div id="bar" class="idle hidden">
    <div class="brand"><div class="logo">RMD</div><strong>ReachMyDevice</strong></div>
    <span id="barStatus"></span><div class="sp"></div>
    <button id="rotate" class="iconbtn ghost" title="Rotate view 90°" style="display:none">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <a href="#" id="disconnect">← Devices</a>
  </div>

  <div id="connect" class="hidden"><div class="card" id="cardBody"></div></div>

  <div id="stage" class="hidden"><video id="screen" playsinline autoplay muted tabindex="0"></video></div>
  <div id="overlay" class="hidden"><div class="box"><div class="spin"></div>
    <div class="msg" id="ovMsg">Connecting…</div><div class="hint2" id="ovHint"></div></div></div>

<script>
(function(){
  const API=location.origin, q=new URLSearchParams(location.search), $=id=>document.getElementById(id);
  // Inline icons (stroke = currentColor) for the per-device actions.
  const ICON={
    connect:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/><path d="M10.5 7.5l4 2.5-4 2.5z" fill="currentColor" stroke="none"/></svg>',
    cmd:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3"/><path d="M13 15h4"/></svg>',
    edit:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>',
    del:'<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2"/><path d="M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13"/><path d="M10 11v6M14 11v6"/></svg>'};

  // ================= Session mode (?token&host present) =====================
  if(q.get('token') && q.get('host')){
    $('stage').classList.remove('hidden'); $('overlay').classList.remove('hidden'); $('bar').classList.remove('hidden');
    $('ovHint').textContent='host '+(q.get('host')||'').slice(0,12)+'…';
    const status=document.createElement('span'); status.id='status'; status.hidden=true; document.body.appendChild(status);
    new MutationObserver(()=>{const t=status.textContent||''; $('ovMsg').textContent=t; $('barStatus').textContent=t;})
      .observe(status,{childList:true,characterData:true,subtree:true});
    const vid=$('screen');
    vid.addEventListener('playing',()=>$('overlay').classList.add('hidden'));
    vid.addEventListener('emptied',()=>$('overlay').classList.remove('hidden'));
    // Rotate control (handy on phones: view a landscape desktop in landscape on a
    // portrait screen). Cycles 0→90→180→270°; the quarter-turn count is stored on
    // the video as data-rot so the WASM input handler can rotate pointer coords.
    let rot=0; const rotBtn=$('rotate'); rotBtn.style.display='';
    const applyRot=()=>{ vid.classList.remove('rot1','rot2','rot3'); if(rot) vid.classList.add('rot'+rot); vid.dataset.rot=rot; };
    rotBtn.onclick=()=>{ rot=(rot+1)%4; applyRot(); };
    applyRot();
    // "← Devices": go back if there's history, else load the devices screen.
    $('disconnect').onclick=e=>{e.preventDefault(); if(history.length>1) history.back(); else location.href='/app/#/devices';};
    return;
  }

  // ================= Connect app (device management) ========================
  $('connect').classList.remove('hidden');
  let auth=sessionStorage.getItem('rmd_va'), user=sessionStorage.getItem('rmd_vu')||'', mode='login';
  const el=$('cardBody');
  const basic=(u,p)=>'Basic '+btoa(u+':'+p);
  const passOf=()=>{ try{ return atob((auth||'').slice(6)).split(':').slice(1).join(':'); }catch(e){ return ''; } };
  const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const wssBase=()=>(location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws';
  const runCmd=t=>`RMD_RENDEZVOUS_URL=${wssBase()} \\\n  RMD_TOKEN=${t} \\\n  rmdd`;
  const fmtSeen=t=>{if(!t)return{txt:'never seen',on:false};const d=new Date(t*1000),m=Math.round((Date.now()-d)/60000);
    return{txt:m<2?'online now':m<60?m+' min ago':d.toLocaleString(),on:m<2};};
  async function api(path,opts){ return fetch(API+path,opts); }
  async function listDevices(){ const r=await api('/api/devices',{headers:{authorization:auth}}); if(!r.ok) throw r; return r.json(); }
  async function issueToken(device_id,name,role){
    const r=await api('/api/devices',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({username:user,password:passOf(),device_id,name,public_key:'browser',role})});
    if(!r.ok) throw new Error('request failed ('+r.status+')'); return (await r.json()).token;
  }
  // This browser's own signaling identity: a viewer device whose token lets us
  // authenticate to /ws. Reused across sessions (localStorage); auto re-created if
  // the device is deleted. Hidden from the device list (it's not something to view).
  const VTOK=()=>'rmd_vtok_'+user, VDEV=()=>'rmd_vdev_'+user;
  async function viewerToken(){
    let t=localStorage.getItem(VTOK()); if(t) return t;
    const id=crypto.randomUUID().replace(/-/g,'');
    t=await issueToken(id,'web viewer (this browser)','viewer');
    localStorage.setItem(VTOK(),t); localStorage.setItem(VDEV(),id); return t;
  }

  function frame(inner){ el.innerHTML=`<div class="brand" style="margin-bottom:8px">
    <div class="logo">RMD</div><strong style="font-size:15px">ReachMyDevice</strong></div>${inner}
    <div class="foot">The browser decodes H.264; media is end-to-end encrypted (DTLS-SRTP).</div>`; }

  // ---- Login / create account ----
  function renderLogin(){
    frame(`
      <h1>${mode==='login'?'Sign in':'Create an account'}</h1>
      <p class="sub">${mode==='login'?'Sign in to view or manage your devices.':'Create a ReachMyDevice account.'}</p>
      <label>Username</label><input id="u" autocomplete="username" value="${esc(user)}">
      <label>Password</label><input id="p" type="password" autocomplete="current-password">
      <div class="err" id="e"></div>
      <div class="row"><button id="go">${mode==='login'?'Sign in':'Create account'}</button>
        <button class="ghost" id="tog" style="margin-left:auto">${mode==='login'?'Create account':'Have an account? Sign in'}</button></div>`);
    $('go').onclick=submitAuth; $('tog').onclick=()=>{mode=mode==='login'?'register':'login'; renderLogin();};
    $('p').addEventListener('keydown',e=>{if(e.key==='Enter')submitAuth();});
    if(!user)$('u').focus();
  }
  async function submitAuth(){
    const u=$('u').value.trim(),p=$('p').value,e=$('e'); e.textContent='';
    if(!u||!p){e.textContent='Enter your username and password.';return;}
    $('go').disabled=true;
    try{
      if(mode==='register'){ const r=await api('/api/register',{method:'POST',headers:{'content-type':'application/json'},
          body:JSON.stringify({username:u,password:p})});
        if(!r.ok){e.textContent=(await r.json().catch(()=>({}))).error||('Registration failed ('+r.status+')');return;} }
      auth=basic(u,p); const r=await api('/api/devices',{headers:{authorization:auth}});
      if(r.status===401){e.textContent='Invalid username or password.';auth=null;return;}
      if(!r.ok){e.textContent='Sign-in failed ('+r.status+').';auth=null;return;}
      user=u; sessionStorage.setItem('rmd_va',auth); sessionStorage.setItem('rmd_vu',u);
      try{ await viewerToken(); }catch(err){ e.textContent=String(err.message||err); return; }
      go('#/devices');
    }catch(err){ e.textContent='Network error: '+(err.message||err); }
    finally{ $('go').disabled=false; }
  }

  // ---- Devices ----
  let panelHtml='';   // transient panel (register / command output) under the list
  async function renderDevices(){
    let all=[]; try{ all=await listDevices(); }
    catch(r){ auth=null; sessionStorage.clear(); return go('#/login'); }
    // Heal: if this browser's viewer device was deleted, drop the stale token so
    // Connect re-mints one.
    const myDev=localStorage.getItem(VDEV());
    if(myDev && !all.some(d=>d.device_id===myDev)){ localStorage.removeItem(VTOK()); localStorage.removeItem(VDEV()); }
    // The list is an address book of things you can connect TO — i.e. hosts.
    // Viewer-only clients (this browser and any others) aren't connectable, so
    // they're hidden rather than shown as dead rows.
    const devices=all.filter(d=>['host','both'].includes((d.role||'').toLowerCase()));
    const hostCount=devices.length;
    const rows=devices.map(d=>{
      const s=fmtSeen(d.last_seen), canView=['host','both'].includes((d.role||'').toLowerCase());
      return `<div class="dev"><div class="dot ${s.on?'on':''}"></div>
        <div class="meta"><div class="name">${esc(d.name)} <span class="pill">${esc(d.role)}</span></div>
          <div class="sub2 mono">${esc(d.device_id.slice(0,22))}… · ${esc(s.txt)}</div></div>
        <div class="acts">
          ${canView?`<button class="iconbtn" data-act="connect" data-id="${esc(d.device_id)}" title="Connect — view this device">${ICON.connect}</button>`:''}
          ${canView?`<button class="iconbtn ghost" data-act="cmd" data-id="${esc(d.device_id)}" data-name="${esc(d.name)}" data-role="${esc(d.role)}" title="Show run command (issues a fresh token)">${ICON.cmd}</button>`:''}
          <button class="iconbtn ghost" data-act="rename" data-id="${esc(d.device_id)}" data-name="${esc(d.name)}" title="Rename this device">${ICON.edit}</button>
          <button class="iconbtn danger" data-act="del" data-id="${esc(d.device_id)}" title="Remove this device">${ICON.del}</button>
        </div></div>`;}).join('');
    // No host to view yet → onboarding call-to-action (download/install + register).
    const onboarding = hostCount ? '' : `<div class="panel" style="text-align:center">
      <div style="font-size:15px;font-weight:600">Add a device to view</div>
      <div class="hint" style="max-width:430px;margin:6px auto 0">Install the ReachMyDevice host
        (<span class="mono">rmdd</span>) on the machine you want to control, then register it here.</div>
      <pre class="mono" style="text-align:left;margin-top:12px">curl -fsSL https://reachmy.dev/install.sh | sh</pre>
      <div class="hint">…or <a href="https://github.com/Brainwires/reachmydevice/releases/latest" target="_blank" rel="noopener">download from the releases page ↗</a>
        and put <span class="mono">rmdd</span> on your PATH.</div>
      <div class="row" style="justify-content:center;margin-top:12px"><button id="addHostCta">+ Register your first host</button></div></div>`;
    frame(`
      <div class="head"><h1 style="margin:6px 0">Your devices</h1><div class="sp"></div>
        <span class="muted" style="font-size:12.5px">${esc(user)}</span></div>
      <p class="sub">Connect to a host that's running the agent, or manage your devices.</p>
      ${onboarding}
      ${rows?`<div class="devs">${rows}</div>`:''}
      <div id="panel">${panelHtml}</div>
      <div class="row"><button id="addHost">+ Register a host</button>
        <button class="ghost sm" id="refresh">Refresh</button>
        <button class="ghost sm" id="signout" style="margin-left:auto">Sign out</button></div>`);
    el.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>deviceAction(b.dataset));
    $('addHost').onclick=registerHost; if($('addHostCta'))$('addHostCta').onclick=registerHost;
    $('refresh').onclick=()=>{panelHtml='';renderDevices();};
    $('signout').onclick=()=>{sessionStorage.clear(); localStorage.removeItem('rmd_vtok_'+user); auth=null; go('#/login');};
    wirePanel();
  }
  function commandPanel(title,token){
    panelHtml=`<div class="panel"><h2>${esc(title)}</h2>
      <div class="hint" style="margin-top:2px"><b>1.</b> Install once:
        <span class="mono">curl -fsSL https://reachmy.dev/install.sh | sh</span>
        — or <a href="https://github.com/Brainwires/reachmydevice/releases/latest" target="_blank" rel="noopener">download ↗</a>
        and put <span class="mono">rmdd</span> on your PATH.</div>
      <div class="hint" style="margin:10px 0 4px"><b>2.</b> Run it (grant Screen Recording on first launch):</div>
      <pre id="cmdPre" class="mono">${esc(runCmd(token))}</pre>
      <div class="row" style="margin-top:8px"><button class="sm ghost" id="copyCmd">Copy command</button>
        <button class="sm ghost" id="closeCmd">Close</button>
        <span class="hint" style="margin:0">Then <b>Refresh</b> — it appears with a green dot.</span></div></div>`;
  }
  function wirePanel(){
    const c=$('copyCmd'); if(c) c.onclick=()=>{navigator.clipboard.writeText($('cmdPre').textContent);c.textContent='Copied';};
    const x=$('closeCmd'); if(x) x.onclick=()=>{panelHtml='';renderDevices();};
  }
  async function deviceAction(ds){
    if(ds.act==='connect'){
      try{ const t=await viewerToken(); location.href=`/app/?token=${encodeURIComponent(t)}&host=${encodeURIComponent(ds.id)}`; }
      catch(e){ alert('Could not get a viewer token: '+(e.message||e)); }
    } else if(ds.act==='cmd'){
      try{ const t=await issueToken(ds.id,ds.name,ds.role); commandPanel('Run “'+ds.name+'” — new token issued',t); renderDevices(); }
      catch(e){ alert('Failed to issue a token: '+(e.message||e)); }
    } else if(ds.act==='rename'){
      const name=prompt('Rename device:',ds.name); if(name===null) return;
      const nm=name.trim(); if(!nm||nm===ds.name) return;
      const r=await api('/api/devices/'+encodeURIComponent(ds.id),{method:'PATCH',
        headers:{authorization:auth,'content-type':'application/json'},body:JSON.stringify({name:nm})});
      if(!r.ok){ alert('Rename failed ('+r.status+')'); return; }
      panelHtml=''; renderDevices();
    } else if(ds.act==='del'){
      if(!confirm('Remove this device? Any tokens it holds stop working.')) return;
      const r=await api('/api/devices/'+encodeURIComponent(ds.id),{method:'DELETE',headers:{authorization:auth}});
      if(!r.ok) alert('Remove failed ('+r.status+')'); panelHtml=''; renderDevices();
    }
  }
  async function registerHost(){
    const name=prompt('Name this host (e.g. "Office Mac"):','my host'); if(name===null) return;
    try{ const id=crypto.randomUUID().replace(/-/g,''); const t=await issueToken(id,name||'host','host');
      commandPanel('New host “'+(name||'host')+'” registered',t); renderDevices();
    }catch(e){ alert('Register failed: '+(e.message||e)); }
  }

  // ---- Router (hash → screen; back button works) ----
  function go(hash){ if(location.hash===hash) route(); else location.hash=hash; }
  function route(){
    if(!auth){ if(location.hash!=='#/login'){location.hash='#/login';return;} return renderLogin(); }
    if(location.hash==='#/login'){ location.hash='#/devices'; return; }
    renderDevices();
  }
  window.addEventListener('hashchange',route);
  // Re-check device/host status when the tab or window regains focus (returning
  // from another app/tab), so the online dots reflect reality without a manual
  // Refresh. Only re-fetches on the device list, and only while visible.
  const refreshIfDevices=()=>{ if(auth && !document.hidden && location.hash==='#/devices') renderDevices(); };
  document.addEventListener('visibilitychange',refreshIfDevices);
  window.addEventListener('focus',refreshIfDevices);
  if(!location.hash) location.hash = auth?'#/devices':'#/login'; else route();
})();
</script>
</body>
</html>
