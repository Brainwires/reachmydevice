<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReachMyDevice — web viewer</title>
<link data-trunk rel="rust" data-wasm-opt="s" />
<style>
  html,body { margin:0; height:100%; background:#0b0d11; color:#e6e8ec;
    font:14px system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #stage { position:fixed; inset:0; display:grid; place-items:center; }
  #screen { max-width:100vw; max-height:100vh; width:auto; height:auto;
    background:#000; outline:none; cursor:none; }
  #bar { position:fixed; top:0; left:0; right:0; display:flex; gap:10px;
    align-items:center; padding:8px 12px; background:rgba(15,17,21,.72);
    backdrop-filter:blur(6px); font-size:13px; z-index:10;
    transition:opacity .25s; }
  #bar:not(:hover) { opacity:.25; }
  .logo { width:26px; height:26px; border-radius:7px; padding:0 8px; min-width:26px;
    background:linear-gradient(135deg,#4f8cff,#8a5cff); display:grid; place-items:center;
    color:#fff; font-weight:700; font-size:11px; letter-spacing:1px; }
  #status { color:#9aa3b2; }
  a { color:#4f8cff; text-decoration:none; margin-left:auto; }
</style>
</head>
<body>
  <div id="bar">
    <div class="logo">RMD</div>
    <strong>ReachMyDevice</strong>
    <span id="status">loading…</span>
    <a href="https://reachmy.dev/">reachmy.dev</a>
  </div>
  <div id="stage">
    <video id="screen" playsinline autoplay muted tabindex="0"></video>
  </div>
</body>
</html>
