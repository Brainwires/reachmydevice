# cross-rs config for cross-compiling the Linux binaries (esp. linux-arm64 for
# Orange Pi 5B / Raspberry Pi 4-5) on an x86_64 build host like biscuits:
#
#   cargo install cross
#   cross build --release --target aarch64-unknown-linux-gnu -p rmd-host -p rmd-viewer
#
# The default cross image ships the aarch64 gcc/g++ cross toolchain + pkg-config
# wired for the sysroot; we add the arm64 dev libraries our binaries link against
# (X11/XTest/XDamage/XCB for capture+input, xkbcommon/wayland for the viewer's
# winit window, ALSA for optional audio). openh264 (C++) builds via the `cc` crate
# with the image's cross compiler; it uses ARM asm (no nasm) on aarch64.
#
# cross images use an older Ubuntu (older glibc), so the binary runs on Raspberry
# Pi OS (bookworm) and newer alike.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install --assume-yes --no-install-recommends libx11-dev:arm64 libxext-dev:arm64 libxtst-dev:arm64 libxdamage-dev:arm64 libxcb1-dev:arm64 libxkbcommon-dev:arm64 libwayland-dev:arm64 libasound2-dev:arm64",
]

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update",
    "apt-get install --assume-yes --no-install-recommends libx11-dev libxext-dev libxtst-dev libxdamage-dev libxcb1-dev libxkbcommon-dev libwayland-dev libasound2-dev nasm",
]
