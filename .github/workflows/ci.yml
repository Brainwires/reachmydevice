name: CI

on:
  push:
    branches: [master, main, development]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # macOS: the full native stack (ScreenCaptureKit/VideoToolbox path). Gating.
  build-macos:
    name: build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install protoc
        run: brew install protobuf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test --all

  # Linux: the portable crates (protocol, transport, codec, input, capture,
  # session, rendezvous, signal-dev) build and their tests run. capture/input
  # compile as "unsupported" stubs until the X11 backends land (Phase 3).
  build-linux:
    name: build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler nasm pkg-config xvfb \
            libx11-dev libxext-dev libxtst-dev libxdamage-dev libxcb1-dev \
            libxkbcommon-dev libwayland-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (portable crates)
        run: >
          cargo clippy
          -p openreach-protocol -p openreach-transport -p openreach-codec
          -p openreach-input -p openreach-capture -p openreach-session
          -p openreach-rendezvous -p openreach-signal-dev
          --all-targets -- -D warnings
      - name: Test (portable crates)
        run: >
          cargo test
          -p openreach-protocol -p openreach-transport -p openreach-codec
          -p openreach-session -p openreach-rendezvous
      # Validate the X11 capture + input backends against a headless Xvfb server.
      - name: X11 backends smoke (Xvfb)
        run: |
          cargo build -p openreach-capture --example capture_smoke -p openreach-input --example input_smoke
          Xvfb :99 -screen 0 1280x720x24 >/tmp/xvfb.log 2>&1 &
          sleep 2
          DISPLAY=:99 cargo run -q -p openreach-capture --example capture_smoke
          DISPLAY=:99 cargo run -q -p openreach-input --example input_smoke

  # Supply-chain gate: advisories, licenses, banned crates, and — critically —
  # that no external git/unknown sources sneak in (the webrtc fork must stay a
  # vendored submodule path dep). Plus a redundant advisory scan via cargo-audit.
  supply-chain:
    name: supply chain (deny + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
      - name: cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Windows: Phase 3 target. Build the portable, non-GUI crates only for now.
  build-windows:
    name: build (Windows) [Phase 3]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: choco install protoc -y
      - name: Build portable crates
        run: >
          cargo build
          -p openreach-protocol -p openreach-codec -p openreach-rendezvous
          -p openreach-signal-dev
