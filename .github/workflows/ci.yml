name: CI

on:
  push:
    branches: [master, main, development]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # macOS: the full native stack (ScreenCaptureKit/VideoToolbox path). Gating.
  build-macos:
    name: build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      # No protoc (protox is pure Rust). nasm powers rav1e/rav1d AV1 SIMD;
      # cmake is only needed for `--all-features` (the C libopus audio path).
      - name: Install build deps
        run: brew install nasm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test --all

  # Linux: the portable crates (protocol, transport, codec, input, capture,
  # session, rendezvous, signal-dev) build and their tests run. capture/input
  # compile as "unsupported" stubs until the X11 backends land (Phase 3).
  build-linux:
    name: build & test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm pkg-config xvfb \
            libx11-dev libxext-dev libxtst-dev libxdamage-dev libxcb1-dev \
            libxkbcommon-dev libwayland-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (portable crates)
        run: >
          cargo clippy
          -p rmd-protocol -p rmd-transport -p rmd-codec
          -p rmd-input -p rmd-capture -p rmd-session
          -p rmd-rendezvous -p rmd-signal-dev
          --all-targets -- -D warnings
      - name: Test (portable crates)
        run: >
          cargo test
          -p rmd-protocol -p rmd-transport -p rmd-codec
          -p rmd-session -p rmd-rendezvous
      # Validate the X11 capture + input backends against a headless Xvfb server.
      - name: X11 backends smoke (Xvfb)
        run: |
          cargo build -p rmd-capture --example capture_smoke -p rmd-input --example input_smoke
          Xvfb :99 -screen 0 1280x720x24 >/tmp/xvfb.log 2>&1 &
          sleep 2
          DISPLAY=:99 cargo run -q -p rmd-capture --example capture_smoke
          DISPLAY=:99 cargo run -q -p rmd-input --example input_smoke

  # Supply-chain gate: advisories, licenses, banned crates, and — critically —
  # that no external git/unknown sources sneak in (the webrtc fork must stay a
  # vendored submodule path dep). cargo-deny's `check advisories` already scans the
  # RustSec DB, so a separate cargo-audit pass is redundant (and the docker action
  # tripped over the pinned rust-toolchain) — dropped it; the job name is unchanged.
  supply-chain:
    name: supply chain (deny + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  # Fuzz the untrusted-input parsers (protobuf decode, file-transfer state
  # machine, signaling frame) for a short time each. Uses nightly + cargo-fuzz;
  # the crates' stable `*_fuzz_smoke`/`fuzz_smoke` tests run in the normal jobs.
  fuzz:
    name: fuzz (short)
    runs-on: ubuntu-latest
    # cargo-fuzz needs nightly (-Z sanitizer flags). The repo's rust-toolchain.toml
    # pins 1.92.0 and overrides the installed nightly per-directory, so force
    # nightly explicitly for every cargo/rustc invocation in this job.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config \
            libx11-dev libxext-dev libxtst-dev libxdamage-dev libxcb1-dev \
            libxkbcommon-dev libwayland-dev libasound2-dev
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz targets (60s each)
        run: |
          for t in protocol_decode filexfer_handle relay_frame; do
            cargo fuzz run "$t" -- -max_total_time=60 -rss_limit_mb=4096
          done

  # Windows: Phase 3 target. Build the portable, non-GUI crates only for now.
  build-windows:
    name: build (Windows) [Phase 3]
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # No protoc needed (protox is pure Rust). nasm for rav1e/rav1d AV1 SIMD.
      - name: Install nasm
        run: choco install nasm -y
      - name: Build portable crates
        run: >
          cargo build
          -p rmd-protocol -p rmd-codec -p rmd-rendezvous
          -p rmd-signal-dev
