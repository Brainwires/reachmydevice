name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # macOS is the Phase-1 spike target; it is the gating job.
  build-macos:
    name: build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: brew install protobuf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test --all

  # Linux and Windows are Phase 3. Kept as allowed-to-fail placeholders so the
  # matrix exists from day one without blocking the macOS-first spike.
  build-other:
    name: build (${{ matrix.os }}) [Phase 3]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y
      - name: Build (non-macOS crates only for now)
        run: cargo build -p openreach-protocol -p openreach-signal-dev
